<style>
  :root{
    --bg:#171514;
    --panel:#201D1C;
    --control:#2A2725;
    --control-hover:#332F2D;
    --control-border:#3B3634;
    --paper:#F3EEE4;
    --accent:#C1552E;
    --accent-hover:#D46A41;
    --accent-soft:rgba(193,85,46,0.18);
    --text:#EDE7DC;
    --muted:#9A928A;
    --muted-2:#6E6864;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Helvetica,Arial,sans-serif;
    overflow:hidden;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}

  #app{display:flex;flex-direction:column;height:100vh;}

  /* ---------- Toolbar ---------- */
  #toolbar{
    height:58px;flex:0 0 58px;display:flex;align-items:center;gap:14px;
    background:var(--panel);border-bottom:1px solid var(--control-border);
    padding:0 18px;position:relative;z-index:5;
  }
  .brand{display:flex;align-items:center;gap:9px;color:var(--text);font-weight:600;
    letter-spacing:.2px;font-size:15px;margin-right:8px;}
  .brand svg{color:var(--accent);flex:0 0 auto;}
  .brand img{width:22px;height:22px;flex:0 0 auto;border-radius:50%;object-fit:contain;}
  .toolbar-spacer{flex:1;}
  .count-badge{color:var(--muted);font-size:12px;margin-right:10px;}
  .btn{
    display:inline-flex;align-items:center;gap:6px;background:var(--control);
    border:1px solid var(--control-border);color:var(--text);
    padding:9px 14px;border-radius:8px;font-size:13px;font-weight:500;
    cursor:pointer;transition:background .12s,border-color .12s;white-space:nowrap;
  }
  .btn:hover{background:var(--control-hover);}
  .btn:active{transform:translateY(1px);}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
  .btn.primary:hover{background:var(--accent-hover);}
  .btn:disabled{opacity:.5;cursor:default;}
  .btn svg{width:15px;height:15px;flex:0 0 auto;}

  /* ---------- Main layout ---------- */
  main{flex:1;display:flex;min-height:0;}
  #canvas-outer{
    flex:1;display:flex;align-items:center;justify-content:center;
    overflow:auto;padding:32px;position:relative;
    background:
      radial-gradient(ellipse at 50% 0%, #201D1C 0%, #171514 60%);
  }
  .canvas-frame{position:relative;flex:0 0 auto;}
  #canvas{
    position:absolute;top:0;left:0;transform-origin:top left;
    background:var(--paper);
    box-shadow:0 30px 70px rgba(0,0,0,.55), 0 2px 0 rgba(0,0,0,.2);
    overflow:hidden;
  }
  #canvas.textured::after{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:repeating-linear-gradient(45deg, rgba(0,0,0,0.035) 0 5px, transparent 5px 15px);
  }
  .empty-state{
    position:absolute;inset:6%;border:5px dashed rgba(0,0,0,.16);border-radius:35px;
    display:flex;align-items:center;justify-content:center;flex-direction:column;gap:25px;
    color:rgba(0,0,0,.38);text-align:center;pointer-events:none;
  }
  .empty-state svg{width:85px;height:85px;opacity:.6;}
  .empty-state span{font-size:38px;max-width:700px;line-height:1.4;}

  /* ---------- Photos ---------- */
  .photo{position:absolute;top:0;left:0;cursor:grab;touch-action:none;}
  .photo:active{cursor:grabbing;}
  .frame{position:absolute;inset:0;box-sizing:border-box;display:flex;}
  .frame img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;user-select:none;
    -webkit-user-drag:none;}
  .frame.border-none{padding:0;background:transparent;border-radius:3px;overflow:hidden;}
  .frame.border-print{padding:4%;background:#fff;border-radius:2px;}
  .frame.border-polaroid{padding:4.5% 4.5% 15% 4.5%;background:#fbfaf5;border-radius:2px;}
  .shadow-soft{box-shadow:0 15px 40px rgba(0,0,0,.20);}
  .shadow-medium{box-shadow:0 30px 70px rgba(0,0,0,.32);}
  .shadow-strong{box-shadow:0 50px 105px rgba(0,0,0,.46);}
  .photo.lifted{z-index:9998 !important;}
  .photo.lifted .frame{box-shadow:0 85px 150px rgba(0,0,0,.5) !important;transform:scale(1.015);}
  .frame{transition:box-shadow .15s;}

  .handle{position:absolute;display:none;align-items:center;justify-content:center;
    background:var(--accent);border:2px solid #fff;border-radius:50%;
    box-shadow:0 1px 4px rgba(0,0,0,.4);z-index:20;}
  .photo.selected .handle{display:flex;}
  .handle-resize{width:15px;height:15px;right:-8px;bottom:-8px;cursor:nwse-resize;}
  .handle-rotate{width:13px;height:13px;left:50%;top:-30px;margin-left:-6.5px;cursor:grab;}
  .handle-rotate::before{content:"";position:absolute;left:50%;top:100%;width:1px;height:17px;
    background:rgba(255,255,255,.55);transform:translateX(-50%);}
  .handle-delete{width:20px;height:20px;right:-10px;top:-10px;cursor:pointer;background:#3a3634;
    border-color:#fff;font-size:12px;color:#fff;line-height:1;}
  .selection-outline{position:absolute;inset:0;border:1.5px dashed var(--accent);
    border-radius:2px;pointer-events:none;display:none;}
  .photo.selected .selection-outline{display:block;}

  /* ---------- Inspector ---------- */
  #inspector{
    width:272px;flex:0 0 272px;background:var(--panel);border-left:1px solid var(--control-border);
    overflow-y:auto;padding:20px 18px 40px;
  }
  .insp-section{margin-bottom:26px;}
  .insp-label{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
    color:var(--muted);margin-bottom:10px;}
  .segmented{display:flex;background:var(--control);border:1px solid var(--control-border);
    border-radius:8px;padding:3px;gap:3px;}
  .segmented button{flex:1;background:transparent;border:none;color:var(--muted);
    padding:7px 0;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;}
  .segmented button.active{background:var(--accent);color:#fff;}
  select, input[type=range], input[type=color]{width:100%;}
  select{
    background:var(--control);border:1px solid var(--control-border);color:var(--text);
    padding:8px 10px;border-radius:7px;font-size:13px;
  }
  .row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px;}
  .row label{font-size:12.5px;color:var(--text);}
  .row .val{font-size:11.5px;color:var(--muted);}
  input[type=range]{-webkit-appearance:none;height:4px;background:var(--control-border);border-radius:2px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;
    background:var(--accent);cursor:pointer;border:2px solid #171514;}
  .swatches{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .swatch{width:26px;height:26px;border-radius:50%;border:2px solid var(--control-border);cursor:pointer;}
  .swatch.active{border-color:var(--accent);}
  .custom-color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  input[type=color]{-webkit-appearance:none;width:26px;height:26px;padding:0;border:2px solid var(--control-border);
    border-radius:50%;background:none;cursor:pointer;overflow:hidden;}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0;}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:50%;}
  .check-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text);margin-top:4px;}

  .full-btn{width:100%;justify-content:center;margin-top:6px;}
  .hint{font-size:11.5px;color:var(--muted-2);line-height:1.5;margin-top:18px;
    border-top:1px solid var(--control-border);padding-top:14px;}

  .selected-preview{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
  .selected-preview img{width:52px;height:52px;object-fit:cover;border-radius:6px;
    border:1px solid var(--control-border);}
  .selected-preview .meta{font-size:11.5px;color:var(--muted);}
  .btn-row{display:flex;gap:8px;margin-bottom:8px;}
  .btn-row .btn{flex:1;padding:8px 8px;font-size:12px;justify-content:center;}
  .btn.danger{background:transparent;border-color:#5a3327;color:#E38868;}
  .btn.danger:hover{background:rgba(193,85,46,.12);}

  /* ---------- Filmstrip ---------- */
  #filmstrip{
    flex:0 0 92px;position:relative;background:#100E0D;border-top:1px solid var(--control-border);
    display:flex;align-items:center;gap:10px;padding:0 18px;overflow-x:auto;
  }
  #filmstrip::before,#filmstrip::after{
    content:"";position:absolute;left:0;right:0;height:9px;pointer-events:none;
    background-image:radial-gradient(circle, #000 3px, transparent 3.6px);
    background-size:22px 9px;background-repeat:repeat-x;opacity:.55;
  }
  #filmstrip::before{top:0;}
  #filmstrip::after{bottom:0;}
  .film-empty{color:var(--muted-2);font-size:12.5px;}
  .film-thumb{
    position:relative;flex:0 0 60px;width:60px;height:60px;border-radius:5px;overflow:hidden;
    border:2px solid transparent;cursor:pointer;background:#000;
  }
  .film-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .film-thumb.active{border-color:var(--accent);}
  .film-thumb .rm{
    position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;
    background:rgba(0,0,0,.65);color:#fff;font-size:10px;display:flex;align-items:center;
    justify-content:center;opacity:0;transition:opacity .1s;
  }
  .film-thumb:hover .rm{opacity:1;}

  #fileInput, #bgFileInput{display:none;}

  .drop-active #canvas-outer{outline:2px dashed var(--accent);outline-offset:-2px;}

  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#3a3634;border-radius:5px;}
  ::-webkit-scrollbar-track{background:transparent;}

  /* ---------- Format toggle ---------- */
  .format-toggle{display:flex;background:var(--control);border:1px solid var(--control-border);
    border-radius:8px;padding:3px;gap:2px;}
  .format-toggle button{background:transparent;border:none;color:var(--muted);
    padding:7px 11px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;}
  .format-toggle button.active{background:var(--accent);color:#fff;}

  /* ---------- Export modal ---------- */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;
    align-items:center;justify-content:center;z-index:1000;padding:24px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:var(--panel);border:1px solid var(--control-border);border-radius:14px;
    padding:22px;max-width:min(520px,92vw);max-height:88vh;overflow:auto;
    box-shadow:0 30px 70px rgba(0,0,0,.6);}
  .modal-box h3{margin:0 0 14px;font-size:16px;color:var(--text);}
  .modal-img-wrap{background:#000;border-radius:8px;overflow:hidden;display:flex;
    align-items:center;justify-content:center;max-height:50vh;}
  .modal-img-wrap img{max-width:100%;max-height:50vh;display:block;}
  .modal-hint{font-size:12.5px;color:var(--muted);line-height:1.5;margin:14px 0;}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
  .modal-actions .btn{text-decoration:none;}

  /* ---------- Classic Picasa-style skin (colors & button styling only) ---------- */
  #app.theme-classic{
    --bg:#CFCFCF; --panel:#E9E9E9; --control:#FFFFFF; --control-hover:#F5F5F5;
    --control-border:#ACACAC; --accent:#3E7FC7; --accent-hover:#5A94D6;
    --accent-soft:rgba(62,127,199,0.18); --text:#2B2B2B; --muted:#6E6E6E; --muted-2:#8C8C8C;
    background:linear-gradient(to bottom, #DEDEDE, #C6C6C6);
  }
  #app.theme-classic #toolbar{
    background:linear-gradient(to bottom, #F3F3F3 0%, #D9D9D9 100%);border-bottom:1px solid #A0A0A0;}
  #app.theme-classic #inspector{
    background:linear-gradient(to bottom, #EFEFEF 0%, #DCDCDC 100%);border-left:1px solid #A0A0A0;}
  #app.theme-classic #filmstrip{
    background:linear-gradient(to bottom, #D8D8D8 0%, #C4C4C4 100%);border-top:1px solid #A0A0A0;}
  #app.theme-classic #filmstrip::before,#app.theme-classic #filmstrip::after{
    background-image:radial-gradient(circle, rgba(0,0,0,.35) 3px, transparent 3.6px);}
  #app.theme-classic #canvas-outer{
    background:radial-gradient(ellipse at 50% 0%, #C9C9C9 0%, #B0B0B0 60%);}
  #app.theme-classic .btn{
    background:linear-gradient(to bottom, #FFFFFF 0%, #E2E2E2 100%);border:1px solid #9E9E9E;
    color:#2B2B2B;box-shadow:inset 0 1px 0 rgba(255,255,255,.8), 0 1px 1px rgba(0,0,0,.08);
    border-radius:5px;}
  #app.theme-classic .btn:hover{background:linear-gradient(to bottom, #FFFFFF 0%, #ECECEC 100%);}
  #app.theme-classic .btn.primary,#app.theme-classic .btn.primary:hover{
    background:linear-gradient(to bottom, #82B6EA 0%, #3E7FC7 100%);border:1px solid #2E62A0;
    color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.5), 0 1px 1px rgba(0,0,0,.15);}
  #app.theme-classic .btn.danger{color:#B33A2E;background:linear-gradient(to bottom,#fff,#f2e3e0);border-color:#cc8a7d;}
  #app.theme-classic .btn:disabled{opacity:.55;}
  #app.theme-classic .segmented,#app.theme-classic .format-toggle{
    background:#fff;border:1px solid #ACACAC;box-shadow:inset 0 1px 2px rgba(0,0,0,.08);}
  #app.theme-classic .segmented button,#app.theme-classic .format-toggle button{color:#555;}
  #app.theme-classic .segmented button.active,#app.theme-classic .format-toggle button.active{
    background:linear-gradient(to bottom, #82B6EA 0%, #3E7FC7 100%);color:#fff;}
  #app.theme-classic select{background:#fff;border:1px solid #ACACAC;color:#2B2B2B;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.06);}
  #app.theme-classic input[type=range]{background:#C7C7C7;}
  #app.theme-classic input[type=range]::-webkit-slider-thumb{border:2px solid #EFEFEF;}
  #app.theme-classic .brand{color:#2B2B2B;}
  #app.theme-classic .brand svg{color:#3E7FC7;}
  #app.theme-classic .modal-box{background:#EFEFEF;border-color:#ACACAC;color:#2B2B2B;}
  #app.theme-classic .modal-img-wrap{background:#111;}
  #app.theme-classic .film-thumb{border-color:transparent;}
  #app.theme-classic ::-webkit-scrollbar-thumb{background:#B0B0B0;}

  /* ---------- Dark Mode override (the original skin), layered on top of Classic ---------- */
  #app.theme-dark{
    --bg:#171514; --panel:#201D1C; --control:#2A2725; --control-hover:#332F2D;
    --control-border:#3B3634; --accent:#3E7FC7; --accent-hover:#5A94D6;
    --accent-soft:rgba(62,127,199,0.18); --text:#EDE7DC; --muted:#9A928A; --muted-2:#6E6864;
    background:var(--bg);
  }
  #app.theme-dark #toolbar{background:var(--panel);border-bottom:1px solid var(--control-border);}
  #app.theme-dark #inspector{background:var(--panel);border-left:1px solid var(--control-border);}
  #app.theme-dark #filmstrip{background:#100E0D;border-top:1px solid var(--control-border);}
  #app.theme-dark #filmstrip::before,#app.theme-dark #filmstrip::after{
    background-image:radial-gradient(circle, #000 3px, transparent 3.6px);}
  #app.theme-dark #canvas-outer{background:radial-gradient(ellipse at 50% 0%, #201D1C 0%, #171514 60%);}
  #app.theme-dark .btn{background:var(--control);border:1px solid var(--control-border);
    color:var(--text);box-shadow:none;border-radius:8px;}
  #app.theme-dark .btn:hover{background:var(--control-hover);}
  #app.theme-dark .btn.primary,#app.theme-dark .btn.primary:hover{
    background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:none;}
  #app.theme-dark .btn.primary:hover{background:var(--accent-hover);}
  #app.theme-dark .btn.danger{background:transparent;border-color:#5a3327;color:#E38868;}
  #app.theme-dark .btn:disabled{opacity:.5;}
  #app.theme-dark .segmented,#app.theme-dark .format-toggle{
    background:var(--control);border:1px solid var(--control-border);box-shadow:none;}
  #app.theme-dark .segmented button,#app.theme-dark .format-toggle button{color:var(--muted);}
  #app.theme-dark .segmented button.active,#app.theme-dark .format-toggle button.active{
    background:var(--accent);color:#fff;}
  #app.theme-dark select{background:var(--control);border:1px solid var(--control-border);
    color:var(--text);box-shadow:none;}
  #app.theme-dark input[type=range]{background:var(--control-border);}
  #app.theme-dark input[type=range]::-webkit-slider-thumb{background:var(--accent);border:2px solid #171514;}
  #app.theme-dark .brand{color:var(--text);}
  #app.theme-dark .brand svg{color:var(--accent);}
  #app.theme-dark .modal-box{background:var(--panel);border-color:var(--control-border);color:var(--text);}
  #app.theme-dark .modal-img-wrap{background:#000;}
  #app.theme-dark .film-thumb{border-color:transparent;}
  #app.theme-dark ::-webkit-scrollbar-thumb{background:#3a3634;}
</style>
</head>

<script>
(function(){
  "use strict";

  // ---------------- State ----------------
  const CANVAS_PRESETS = {
    "4:3":  {w:4000,h:3000,label:"Landscape 4:3"},
    "16:10":{w:4000,h:2500,label:"Widescreen Monitor 16:10"},
    "1:1":  {w:4000,h:4000,label:"Square"},
    "16:9": {w:3840,h:2160,label:"Widescreen 16:9"},
    "3:4":  {w:3000,h:4000,label:"Portrait 3:4"},
    "2:3":  {w:2664,h:3996,label:"Tall Portrait 2:3"},
  };

  const BG_PRESETS = ["#F3EEE4","#FFFFFF","#17151A","#B9B2A8","#C9AE85"];

  const state = {
    photos: [],           // {id,src,naturalW,naturalH,cx,cy,w,h,rot,z,border,shadow}
    selectedId: null,
    mode: "grid",          // grid | pile
    canvasPreset: "4:3",
    canvasW: 4000,
    canvasH: 3000,
    background: "#F3EEE4",
    backgroundMode: "color",   // color | image
    backgroundImage: null,     // dataURL
    backgroundFit: "cover",    // cover | tile
    exportFormat: "png",       // png | jpg
    textured: false,
    spacing: 70,
    randomness: 0.6,
    defaultBorder: "print",
    defaultShadow: "medium",
    topZ: 1,
    scale: 1,
    nextId: 1,
  };

  // ---------------- DOM refs ----------------
  const canvasOuter = document.getElementById("canvas-outer");
  const canvasFrame = document.getElementById("canvasFrame");
  const canvasEl = document.getElementById("canvas");
  const emptyState = document.getElementById("emptyState");
  const inspector = document.getElementById("inspector");
  const filmstrip = document.getElementById("filmstrip");
  const countBadge = document.getElementById("countBadge");
  const fileInput = document.getElementById("fileInput");
  const bgFileInput = document.getElementById("bgFileInput");
  const addBtn = document.getElementById("addBtn");
  const exportBtn = document.getElementById("exportBtn");
  const appEl = document.getElementById("app");
  const themeToggleBtn = document.getElementById("themeToggleBtn");
  const formatToggle = document.getElementById("formatToggle");
  const exportModal = document.getElementById("exportModal");
  const exportPreviewImg = document.getElementById("exportPreviewImg");
  const modalDownloadLink = document.getElementById("modalDownloadLink");
  const modalCloseBtn = document.getElementById("modalCloseBtn");

  // ---------------- Helpers ----------------
  function uid(){ return "p" + (state.nextId++); }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function findPhoto(id){ return state.photos.find(p => p.id === id); }

  function bringToFront(p){ p.z = ++state.topZ; }

  function applyCanvasBoxStyle(){
    if(state.backgroundMode === "image" && state.backgroundImage){
      canvasEl.style.backgroundColor = "#000";
      canvasEl.style.backgroundImage = "url(" + state.backgroundImage + ")";
      if(state.backgroundFit === "tile"){
        canvasEl.style.backgroundSize = "auto";
        canvasEl.style.backgroundRepeat = "repeat";
        canvasEl.style.backgroundPosition = "top left";
      } else {
        canvasEl.style.backgroundSize = "cover";
        canvasEl.style.backgroundRepeat = "no-repeat";
        canvasEl.style.backgroundPosition = "center";
      }
    } else {
      canvasEl.style.backgroundImage = "none";
      canvasEl.style.backgroundColor = state.background;
    }
    canvasEl.classList.toggle("textured", state.textured);
  }

  function updateScale(){
    const availW = canvasOuter.clientWidth - 64;
    const availH = canvasOuter.clientHeight - 64;
    const fit = Math.min(availW / state.canvasW, availH / state.canvasH, 1.15);
    state.scale = Math.max(fit, 0.05);
    canvasFrame.style.width = (state.canvasW * state.scale) + "px";
    canvasFrame.style.height = (state.canvasH * state.scale) + "px";
    canvasEl.style.width = state.canvasW + "px";
    canvasEl.style.height = state.canvasH + "px";
    canvasEl.style.transform = "scale(" + state.scale + ")";
  }

  function clientToCanvas(clientX, clientY){
    const rect = canvasFrame.getBoundingClientRect();
    return {
      x: (clientX - rect.left) / state.scale,
      y: (clientY - rect.top) / state.scale,
    };
  }

  // ---------------- Layout algorithms ----------------
  function arrangeGrid(){
    const n = state.photos.length;
    if(!n) return;
    const pad = state.spacing;
    const cols = Math.max(1, Math.round(Math.sqrt(n * (state.canvasW / state.canvasH))));
    const rows = Math.ceil(n / cols);
    const cellW = (state.canvasW - pad * (cols + 1)) / cols;
    const cellH = (state.canvasH - pad * (rows + 1)) / rows;
    state.photos.forEach((p, i) => {
      const col = i % cols, row = Math.floor(i / cols);
      const cellCx = pad + col * (cellW + pad) + cellW / 2;
      const cellCy = pad + row * (cellH + pad) + cellH / 2;
      const ar = p.naturalW / p.naturalH;
      let w = cellW, h = cellW / ar;
      if(h > cellH){ h = cellH; w = cellH * ar; }
      p.w = w; p.h = h; p.cx = cellCx; p.cy = cellCy; p.rot = 0;
      p.z = i + 1;
    });
    state.topZ = n + 1;
  }

  function arrangePile(){
    const n = state.photos.length;
    if(!n) return;
    const baseSize = Math.min(state.canvasW, state.canvasH) * 0.34;
    const spreadR = Math.min(state.canvasW, state.canvasH) * 0.20 * (0.25 + state.randomness * 1.3);
    state.photos.forEach((p, i) => {
      const ar = p.naturalW / p.naturalH;
      const jitter = 1 + (Math.random() - 0.5) * 0.3 * state.randomness;
      let w = baseSize * jitter, h = w / ar;
      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * spreadR;
      p.cx = state.canvasW / 2 + Math.cos(angle) * r;
      p.cy = state.canvasH / 2 + Math.sin(angle) * r;
      p.w = w; p.h = h;
      p.rot = (Math.random() - 0.5) * 36 * state.randomness;
      p.z = i + 1;
    });
    state.topZ = n + 1;
  }

  function arrangeCurrent(){
    if(state.mode === "grid") arrangeGrid(); else arrangePile();
  }

  // ---------------- Rendering ----------------
  function renderAll(){
    applyCanvasBoxStyle();
    renderPhotos();
    renderInspector();
    renderFilmstrip();
    countBadge.textContent = state.photos.length + (state.photos.length === 1 ? " photo" : " photos");
  }

  function renderPhotos(){
    canvasEl.querySelectorAll(".photo").forEach(el => el.remove());
    emptyState.style.display = state.photos.length ? "none" : "flex";

    state.photos.forEach(p => {
      const el = document.createElement("div");
      el.className = "photo" + (p.id === state.selectedId ? " selected" : "");
      el.dataset.id = p.id;
      positionPhotoEl(el, p);

      const frame = document.createElement("div");
      frame.className = "frame border-" + p.border + " shadow-" + p.shadow;
      const img = document.createElement("img");
      img.src = p.src;
      img.draggable = false;
      frame.appendChild(img);
      el.appendChild(frame);

      const outline = document.createElement("div");
      outline.className = "selection-outline";
      el.appendChild(outline);

      const del = document.createElement("div");
      del.className = "handle handle-delete";
      del.textContent = "\u00d7";
      del.title = "Delete";
      el.appendChild(del);

      const rotateH = document.createElement("div");
      rotateH.className = "handle handle-rotate";
      rotateH.title = "Rotate";
      el.appendChild(rotateH);

      const resizeH = document.createElement("div");
      resizeH.className = "handle handle-resize";
      resizeH.title = "Resize";
      el.appendChild(resizeH);

      wirePhotoEvents(el, p, frame, del, rotateH, resizeH);
      canvasEl.appendChild(el);
    });
  }

  function positionPhotoEl(el, p){
    el.style.left = (p.cx - p.w / 2) + "px";
    el.style.top = (p.cy - p.h / 2) + "px";
    el.style.width = p.w + "px";
    el.style.height = p.h + "px";
    el.style.transform = "rotate(" + p.rot + "deg)";
    el.style.zIndex = p.z;
  }

  // ---------------- Interaction ----------------
  function beginPointerDrag(el, onMove, onEnd){
    return function(e){
      e.preventDefault();
      e.stopPropagation();
      el.setPointerCapture(e.pointerId);
      function move(ev){ onMove(ev); }
      function up(ev){
        el.releasePointerCapture(e.pointerId);
        el.removeEventListener("pointermove", move);
        el.removeEventListener("pointerup", up);
        if(onEnd) onEnd(ev);
      }
      el.addEventListener("pointermove", move);
      el.addEventListener("pointerup", up);
    };
  }

  function wirePhotoEvents(el, p, frame, del, rotateH, resizeH){
    // Move
    frame.addEventListener("pointerdown", beginPointerDrag(el, function(ev){
      const cur = clientToCanvas(ev.clientX, ev.clientY);
      p.cx = start.cx + (cur.x - start.x);
      p.cy = start.cy + (cur.y - start.y);
      positionPhotoEl(el, p);
    }));
    let start = {};
    frame.addEventListener("pointerdown", function(ev){
      selectPhoto(p.id);
      bringToFront(p);
      el.style.zIndex = p.z;
      el.classList.add("lifted");
      const c = clientToCanvas(ev.clientX, ev.clientY);
      start = {x:c.x, y:c.y, cx:p.cx, cy:p.cy};
      const releaseLift = function(){ el.classList.remove("lifted"); el.removeEventListener("pointerup", releaseLift); };
      el.addEventListener("pointerup", releaseLift);
    });

    // Resize
    resizeH.addEventListener("pointerdown", beginPointerDrag(resizeH, function(ev){
      const c = clientToCanvas(ev.clientX, ev.clientY);
      const rad = -p.rot * Math.PI / 180;
      const dx = c.x - p.cx, dy = c.y - p.cy;
      const localX = dx * Math.cos(rad) - dy * Math.sin(rad);
      const localY = dx * Math.sin(rad) + dy * Math.cos(rad);
      const dist = Math.hypot(localX, localY);
      const startDist = Math.hypot(rstart.hw, rstart.hh);
      const scaleF = clamp(dist / startDist, 0.15, 8);
      p.w = rstart.w * scaleF;
      p.h = rstart.h * scaleF;
      positionPhotoEl(el, p);
    }, function(){ renderInspector(); }));
    let rstart = {};
    resizeH.addEventListener("pointerdown", function(){
      rstart = {w:p.w, h:p.h, hw:p.w/2, hh:p.h/2};
      selectPhoto(p.id);
    });

    // Rotate
    rotateH.addEventListener("pointerdown", beginPointerDrag(rotateH, function(ev){
      const c = clientToCanvas(ev.clientX, ev.clientY);
      const dx = c.x - p.cx, dy = c.y - p.cy;
      p.rot = Math.round((Math.atan2(dy, dx) * 180 / Math.PI + 90) * 10) / 10;
      positionPhotoEl(el, p);
    }, function(){ renderInspector(); }));
    rotateH.addEventListener("pointerdown", function(){ selectPhoto(p.id); });

    // Delete
    del.addEventListener("pointerdown", function(e){ e.stopPropagation(); });
    del.addEventListener("click", function(e){
      e.stopPropagation();
      removePhoto(p.id);
    });
  }

  function selectPhoto(id){
    if(state.selectedId === id) return;
    state.selectedId = id;
    canvasEl.querySelectorAll(".photo").forEach(el => {
      el.classList.toggle("selected", el.dataset.id === id);
    });
    renderInspector();
    renderFilmstrip();
  }

  function deselect(){
    if(!state.selectedId) return;
    state.selectedId = null;
    canvasEl.querySelectorAll(".photo").forEach(el => el.classList.remove("selected"));
    renderInspector();
    renderFilmstrip();
  }

  function removePhoto(id){
    state.photos = state.photos.filter(p => p.id !== id);
    if(state.selectedId === id) state.selectedId = null;
    renderAll();
  }

  canvasEl.addEventListener("pointerdown", function(e){
    if(e.target === canvasEl || e.target === emptyState || emptyState.contains(e.target)){
      deselect();
    }
  });

  document.addEventListener("keydown", function(e){
    const tag = (e.target && e.target.tagName) || "";
    if(tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;
    if((e.key === "Delete" || e.key === "Backspace") && state.selectedId){
      e.preventDefault();
      removePhoto(state.selectedId);
    } else if(e.key === "Escape"){
      deselect();
    }
  });

  // ---------------- Adding photos ----------------
  function addFiles(fileList){
    const files = Array.from(fileList).filter(f => f.type.startsWith("image/"));
    if(!files.length) return;
    Promise.all(files.map(loadFileAsPhoto)).then(newPhotos => {
      newPhotos.forEach(p => { if(p) state.photos.push(p); });
      arrangeCurrent();
      renderAll();
    });
  }

  function loadFileAsPhoto(file){
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = function(e){
        const img = new Image();
        img.onload = function(){
          resolve({
            id: uid(),
            src: e.target.result,
            naturalW: img.naturalWidth,
            naturalH: img.naturalHeight,
            cx: state.canvasW/2, cy: state.canvasH/2,
            w: 300, h: 300 * (img.naturalHeight/img.naturalWidth),
            rot: 0, z: ++state.topZ,
            border: state.defaultBorder,
            shadow: state.defaultShadow,
          });
        };
        img.onerror = function(){ resolve(null); };
        img.src = e.target.result;
      };
      reader.onerror = function(){ resolve(null); };
      reader.readAsDataURL(file);
    });
  }

  addBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", function(){
    addFiles(fileInput.files);
    fileInput.value = "";
  });

  bgFileInput.addEventListener("change", function(){
    const file = bgFileInput.files[0];
    bgFileInput.value = "";
    if(!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = function(e){
      state.backgroundImage = e.target.result;
      state.backgroundMode = "image";
      applyCanvasBoxStyle();
      renderInspector();
    };
    reader.readAsDataURL(file);
  });

  themeToggleBtn.addEventListener("click", function(){
    appEl.classList.toggle("theme-dark");
    themeToggleBtn.classList.toggle("primary", appEl.classList.contains("theme-dark"));
  });

  formatToggle.querySelectorAll(".fmt-btn").forEach(function(btn){
    btn.addEventListener("click", function(){
      state.exportFormat = btn.dataset.fmt;
      formatToggle.querySelectorAll(".fmt-btn").forEach(b => b.classList.toggle("active", b === btn));
    });
  });

  ["dragover","dragenter"].forEach(evt => {
    appEl.addEventListener(evt, function(e){ e.preventDefault(); appEl.classList.add("drop-active"); });
  });
  ["dragleave","drop"].forEach(evt => {
    appEl.addEventListener(evt, function(e){ appEl.classList.remove("drop-active"); });
  });
  appEl.addEventListener("drop", function(e){
    e.preventDefault();
    if(e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files.length){
      addFiles(e.dataTransfer.files);
    }
  });

  // ---------------- Inspector ----------------
  function renderInspector(){
    const sel = state.selectedId ? findPhoto(state.selectedId) : null;
    inspector.innerHTML = "";
    if(sel){
      inspector.appendChild(buildSelectedPanel(sel));
    } else {
      inspector.appendChild(buildGlobalPanel());
    }
  }

  function el(tag, cls, html){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    if(html !== undefined) e.innerHTML = html;
    return e;
  }

  function buildGlobalPanel(){
    const wrap = document.createDocumentFragment();
    const container = el("div");

    // Layout
    let sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Layout"));
    const seg = el("div", "segmented");
    ["grid","pile"].forEach(m => {
      const b = el("button", m === state.mode ? "active" : "", m === "grid" ? "Grid" : "Pile");
      b.addEventListener("click", () => { state.mode = m; arrangeCurrent(); renderAll(); });
      seg.appendChild(b);
    });
    sec.appendChild(seg);

    const rearrangeBtn = el("button", "btn primary full-btn",
      state.mode === "grid" ? "Rearrange" : "Shuffle");
    rearrangeBtn.addEventListener("click", () => { arrangeCurrent(); renderPhotos(); });
    sec.appendChild(rearrangeBtn);
    container.appendChild(sec);

    // Spacing / randomness
    sec = el("div", "insp-section");
    if(state.mode === "grid"){
      sec.appendChild(el("div", "insp-label", "Spacing"));
      const row = el("div", "row");
      row.appendChild(el("label", "", "Gap between photos"));
      row.appendChild(el("span", "val mono", state.spacing + "px"));
      sec.appendChild(row);
      const range = el("input"); range.type="range"; range.min=10; range.max=250; range.value=state.spacing;
      range.addEventListener("input", () => {
        state.spacing = +range.value;
        row.querySelector(".val").textContent = state.spacing + "px";
        arrangeGrid(); renderPhotos();
      });
      sec.appendChild(range);
    } else {
      sec.appendChild(el("div", "insp-label", "Scatter"));
      const row = el("div", "row");
      row.appendChild(el("label", "", "Spread & tilt"));
      row.appendChild(el("span", "val mono", Math.round(state.randomness*100) + "%"));
      sec.appendChild(row);
      const range = el("input"); range.type="range"; range.min=0; range.max=100; range.value=Math.round(state.randomness*100);
      range.addEventListener("input", () => {
        state.randomness = +range.value/100;
        row.querySelector(".val").textContent = range.value + "%";
      });
      sec.appendChild(range);
    }
    container.appendChild(sec);

    // Canvas size
    sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Canvas Size"));
    const sizeSel = el("select");
    Object.keys(CANVAS_PRESETS).forEach(k => {
      const o = el("option", "", CANVAS_PRESETS[k].label);
      o.value = k;
      if(k === state.canvasPreset) o.selected = true;
      sizeSel.appendChild(o);
    });
    sizeSel.addEventListener("change", () => {
      state.canvasPreset = sizeSel.value;
      state.canvasW = CANVAS_PRESETS[sizeSel.value].w;
      state.canvasH = CANVAS_PRESETS[sizeSel.value].h;
      updateScale(); arrangeCurrent(); renderAll();
    });
    sec.appendChild(sizeSel);
    container.appendChild(sec);

    // Background
    sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Background"));
    const bgSeg = el("div", "segmented");
    [["color","Solid Color"],["image","Image"]].forEach(([v,l]) => {
      const b = el("button", v === state.backgroundMode ? "active" : "", l);
      b.addEventListener("click", () => { state.backgroundMode = v; applyCanvasBoxStyle(); renderInspector(); });
      bgSeg.appendChild(b);
    });
    sec.appendChild(bgSeg);

    if(state.backgroundMode === "color"){
      const swRow = el("div", "swatches"); swRow.style.marginTop = "12px";
      BG_PRESETS.forEach(c => {
        const s = el("div", "swatch" + (c.toLowerCase()===state.background.toLowerCase() ? " active" : ""));
        s.style.background = c;
        s.addEventListener("click", () => { state.background = c; applyCanvasBoxStyle(); renderInspector(); });
        swRow.appendChild(s);
      });
      sec.appendChild(swRow);
      const custRow = el("div", "custom-color-row");
      const colorInput = el("input"); colorInput.type = "color"; colorInput.value = state.background;
      colorInput.addEventListener("input", () => { state.background = colorInput.value; applyCanvasBoxStyle(); });
      custRow.appendChild(colorInput);
      custRow.appendChild(el("label", "", "Custom color"));
      sec.appendChild(custRow);
    } else {
      const imgSection = el("div"); imgSection.style.marginTop = "12px";
      if(state.backgroundImage){
        const prevRow = el("div"); prevRow.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:10px;";
        const thumb = el("img"); thumb.src = state.backgroundImage;
        thumb.style.cssText = "width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid var(--control-border);";
        prevRow.appendChild(thumb);
        const removeBtn = el("button", "btn", "Remove");
        removeBtn.style.cssText = "font-size:11.5px;padding:6px 10px;";
        removeBtn.addEventListener("click", () => { state.backgroundImage = null; applyCanvasBoxStyle(); renderInspector(); });
        prevRow.appendChild(removeBtn);
        imgSection.appendChild(prevRow);
      }
      const chooseBtn = el("button", "btn full-btn", state.backgroundImage ? "Change Image" : "Choose Image");
      chooseBtn.style.marginTop = "0";
      chooseBtn.addEventListener("click", () => bgFileInput.click());
      imgSection.appendChild(chooseBtn);

      const fitRow = el("div", "row"); fitRow.style.marginTop = "12px";
      fitRow.appendChild(el("label", "", "Fit"));
      imgSection.appendChild(fitRow);
      const fitSeg = el("div", "segmented");
      [["cover","Cover"],["tile","Tile"]].forEach(([v,l]) => {
        const b = el("button", v === state.backgroundFit ? "active" : "", l);
        b.addEventListener("click", () => { state.backgroundFit = v; applyCanvasBoxStyle(); renderInspector(); });
        fitSeg.appendChild(b);
      });
      imgSection.appendChild(fitSeg);
      sec.appendChild(imgSection);
    }

    const checkRow = el("label", "check-row"); checkRow.style.marginTop = "12px";
    const checkbox = el("input"); checkbox.type = "checkbox"; checkbox.checked = state.textured;
    checkbox.addEventListener("change", () => { state.textured = checkbox.checked; applyCanvasBoxStyle(); });
    checkRow.appendChild(checkbox);
    checkRow.appendChild(document.createTextNode("Subtle paper texture"));
    sec.appendChild(checkRow);
    container.appendChild(sec);

    // Default style
    sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Photo Style"));
    const borderLabelRow = el("div", "row");
    borderLabelRow.appendChild(el("label", "", "Border"));
    sec.appendChild(borderLabelRow);
    const borderSel = el("select");
    [["print","Print (thin border)"],["polaroid","Polaroid"],["none","None"]].forEach(([v,l]) => {
      const o = el("option","",l); o.value=v; if(v===state.defaultBorder) o.selected=true; borderSel.appendChild(o);
    });
    borderSel.addEventListener("change", () => { state.defaultBorder = borderSel.value; });
    sec.appendChild(borderSel);

    const shadowRow = el("div","row"); shadowRow.style.marginTop="10px"; shadowRow.appendChild(el("label","","Shadow"));
    sec.appendChild(shadowRow);
    const shadowSel = el("select");
    [["soft","Soft"],["medium","Medium"],["strong","Strong"]].forEach(([v,l]) => {
      const o = el("option","",l); o.value=v; if(v===state.defaultShadow) o.selected=true; shadowSel.appendChild(o);
    });
    shadowSel.addEventListener("change", () => { state.defaultShadow = shadowSel.value; });
    sec.appendChild(shadowSel);

    const applyAllBtn = el("button", "btn full-btn", "Apply to all photos");
    applyAllBtn.style.marginTop = "12px";
    applyAllBtn.addEventListener("click", () => {
      state.photos.forEach(p => { p.border = state.defaultBorder; p.shadow = state.defaultShadow; });
      renderPhotos();
    });
    sec.appendChild(applyAllBtn);
    container.appendChild(sec);

    container.appendChild(el("div", "hint",
      "Drag a photo to move it, use the corner handle to resize, and the top handle to rotate. " +
      "Adding new photos re-applies the current layout — nudge things afterward, or hit Rearrange/Shuffle to reset."));

    wrap.appendChild(container);
    return wrap;
  }

  function buildSelectedPanel(p){
    const wrap = document.createDocumentFragment();
    const container = el("div");

    const preview = el("div", "selected-preview");
    const img = el("img"); img.src = p.src;
    preview.appendChild(img);
    const meta = el("div", "meta");
    meta.innerHTML = "Selected photo<br>" + Math.round(p.w) + " \u00d7 " + Math.round(p.h) + "px";
    preview.appendChild(meta);
    container.appendChild(preview);

    let sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Border"));
    const borderSel = el("select");
    [["print","Print (thin border)"],["polaroid","Polaroid"],["none","None"]].forEach(([v,l]) => {
      const o = el("option","",l); o.value=v; if(v===p.border) o.selected=true; borderSel.appendChild(o);
    });
    borderSel.addEventListener("change", () => { p.border = borderSel.value; renderPhotos(); });
    sec.appendChild(borderSel);
    container.appendChild(sec);

    sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Shadow"));
    const shadowSel = el("select");
    [["soft","Soft"],["medium","Medium"],["strong","Strong"]].forEach(([v,l]) => {
      const o = el("option","",l); o.value=v; if(v===p.shadow) o.selected=true; shadowSel.appendChild(o);
    });
    shadowSel.addEventListener("change", () => { p.shadow = shadowSel.value; renderPhotos(); });
    sec.appendChild(shadowSel);
    container.appendChild(sec);

    sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Rotation"));
    const rotRow = el("div", "row");
    rotRow.appendChild(el("label","","Angle"));
    rotRow.appendChild(el("span","val mono", Math.round(p.rot) + "\u00b0"));
    sec.appendChild(rotRow);
    const resetRotBtn = el("button", "btn full-btn", "Reset rotation");
    resetRotBtn.addEventListener("click", () => { p.rot = 0; renderPhotos(); });
    sec.appendChild(resetRotBtn);
    container.appendChild(sec);

    sec = el("div", "insp-section");
    sec.appendChild(el("div", "insp-label", "Layer"));
    const btnRow = el("div", "btn-row");
    const frontBtn = el("button", "btn", "Bring to front");
    frontBtn.addEventListener("click", () => { bringToFront(p); renderPhotos(); });
    const backBtn = el("button", "btn", "Send to back");
    backBtn.addEventListener("click", () => { p.z = 0; state.photos.forEach(o => { if(o!==p) o.z += 1; }); state.topZ += 1; renderPhotos(); });
    btnRow.appendChild(frontBtn); btnRow.appendChild(backBtn);
    sec.appendChild(btnRow);
    container.appendChild(sec);

    const delBtn = el("button", "btn danger full-btn", "Delete photo");
    delBtn.addEventListener("click", () => removePhoto(p.id));
    container.appendChild(delBtn);

    wrap.appendChild(container);
    return wrap;
  }

  // ---------------- Filmstrip ----------------
  function renderFilmstrip(){
    filmstrip.innerHTML = "";
    if(!state.photos.length){
      filmstrip.appendChild(el("div","film-empty","Imported photos will appear here for quick access."));
      return;
    }
    state.photos.forEach(p => {
      const t = el("div", "film-thumb" + (p.id === state.selectedId ? " active" : ""));
      const img = el("img"); img.src = p.src; img.draggable=false;
      t.appendChild(img);
      const rm = el("div", "rm", "\u00d7");
      t.appendChild(rm);
      t.addEventListener("click", (e) => {
        if(e.target === rm) return;
        selectPhoto(p.id);
        bringToFront(p);
        renderPhotos();
      });
      rm.addEventListener("click", (e) => { e.stopPropagation(); removePhoto(p.id); });
      filmstrip.appendChild(t);
    });
  }

  // ---------------- Export (native Canvas 2D — no external library) ----------------
  const SHADOWS = {
    soft:   {color:"rgba(0,0,0,0.20)", blur:40, offsetY:15},
    medium: {color:"rgba(0,0,0,0.32)", blur:70, offsetY:30},
    strong: {color:"rgba(0,0,0,0.46)", blur:105, offsetY:50},
  };

  function loadImageAsync(src){
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = () => reject(new Error("Could not load an image"));
      img.src = src;
    });
  }

  function drawCover(ctx, img, dx, dy, dw, dh){
    const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
    if(!iw || !ih || dw <= 0 || dh <= 0) return;
    const ir = iw / ih, dr = dw / dh;
    let sx, sy, sw, sh;
    if(ir > dr){ sh = ih; sw = sh * dr; sx = (iw - sw) / 2; sy = 0; }
    else { sw = iw; sh = sw / dr; sx = 0; sy = (ih - sh) / 2; }
    ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
  }

  function drawTexture(ctx, w, h){
    const tile = document.createElement("canvas");
    tile.width = 25; tile.height = 25;
    const tctx = tile.getContext("2d");
    tctx.strokeStyle = "rgba(0,0,0,0.09)";
    tctx.lineWidth = 5;
    [[-5,5,5,-5],[0,25,25,0],[20,30,30,20]].forEach(([x1,y1,x2,y2]) => {
      tctx.beginPath(); tctx.moveTo(x1,y1); tctx.lineTo(x2,y2); tctx.stroke();
    });
    const pattern = ctx.createPattern(tile, "repeat");
    ctx.save();
    ctx.fillStyle = pattern;
    ctx.fillRect(0, 0, w, h);
    ctx.restore();
  }

  function getPhotoPadding(p){
    if(p.border === "polaroid") return {t:p.w*0.045, r:p.w*0.045, b:p.w*0.15, l:p.w*0.045};
    if(p.border === "print") return {t:p.w*0.04, r:p.w*0.04, b:p.w*0.04, l:p.w*0.04};
    return {t:0, r:0, b:0, l:0};
  }

  function drawPhotoToCanvas(ctx, p, imgEl){
    ctx.save();
    ctx.translate(p.cx, p.cy);
    ctx.rotate(p.rot * Math.PI / 180);
    const shadow = SHADOWS[p.shadow] || SHADOWS.medium;

    if(p.border === "none"){
      ctx.save();
      ctx.shadowColor = shadow.color;
      ctx.shadowBlur = shadow.blur;
      ctx.shadowOffsetY = shadow.offsetY;
      drawCover(ctx, imgEl, -p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    } else {
      const frameColor = p.border === "polaroid" ? "#fbfaf5" : "#ffffff";
      ctx.save();
      ctx.shadowColor = shadow.color;
      ctx.shadowBlur = shadow.blur;
      ctx.shadowOffsetY = shadow.offsetY;
      ctx.fillStyle = frameColor;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      const pad = getPhotoPadding(p);
      const ix = -p.w/2 + pad.l, iy = -p.h/2 + pad.t;
      const iw = Math.max(p.w - pad.l - pad.r, 1), ih = Math.max(p.h - pad.t - pad.b, 1);
      drawCover(ctx, imgEl, ix, iy, iw, ih);
    }
    ctx.restore();
  }

  async function buildExportCanvas(){
    const canvas = document.createElement("canvas");
    canvas.width = state.canvasW;
    canvas.height = state.canvasH;
    const ctx = canvas.getContext("2d");

    if(state.backgroundMode === "image" && state.backgroundImage){
      const bgImg = await loadImageAsync(state.backgroundImage);
      if(state.backgroundFit === "tile"){
        const pattern = ctx.createPattern(bgImg, "repeat");
        ctx.fillStyle = pattern;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        drawCover(ctx, bgImg, 0, 0, canvas.width, canvas.height);
      }
    } else {
      ctx.fillStyle = state.background;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    if(state.textured) drawTexture(ctx, canvas.width, canvas.height);

    const sorted = [...state.photos].sort((a,b) => a.z - b.z);
    sorted.forEach(p => {
      const imgEl = canvasEl.querySelector('.photo[data-id="' + p.id + '"] img');
      if(imgEl) drawPhotoToCanvas(ctx, p, imgEl);
    });

    return canvas;
  }

  let currentExportUrl = null;

  function showExportModal(url, filename){
    if(currentExportUrl) URL.revokeObjectURL(currentExportUrl);
    currentExportUrl = url;
    exportPreviewImg.src = url;
    modalDownloadLink.href = url;
    modalDownloadLink.download = filename;
    exportModal.classList.add("show");
  }
  function hideExportModal(){
    exportModal.classList.remove("show");
  }
  modalCloseBtn.addEventListener("click", hideExportModal);
  exportModal.addEventListener("click", function(e){ if(e.target === exportModal) hideExportModal(); });

  exportBtn.addEventListener("click", async function(){
    if(!state.photos.length){
      alert("Add some photos first.");
      return;
    }
    exportBtn.disabled = true;
    const originalText = exportBtn.innerHTML;
    exportBtn.textContent = "Exporting\u2026";
    try{
      const canvas = await buildExportCanvas();
      const isJpg = state.exportFormat === "jpg";
      const mime = isJpg ? "image/jpeg" : "image/png";
      const ext = isJpg ? "jpg" : "png";
      const quality = isJpg ? 0.92 : undefined;

      let blob = null;
      if(canvas.toBlob){
        blob = await new Promise(resolve => canvas.toBlob(resolve, mime, quality));
      }

      if(blob){
        showExportModal(URL.createObjectURL(blob), "collage." + ext);
      } else {
        showExportModal(canvas.toDataURL(mime, quality), "collage." + ext);
      }
    } catch(err){
      console.error("Export failed:", err);
      alert("Export failed: " + (err && err.message ? err.message : "unknown error") + ". Please try again.");
    } finally {
      exportBtn.disabled = false;
      exportBtn.innerHTML = originalText;
    }
  });

  // ---------------- Init ----------------
  function init(){
    updateScale();
    renderAll();
    window.addEventListener("resize", updateScale);
  }
  init();

})();
</script>
</body>
